<!-- @dsCard group="Elevation" viewport="700x200" name="Shadow System" subtitle="Ambient · Card · Button — large blur, low opacity, never a hard edge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--cream-2); font-family: var(--font-mono); display: flex; gap: 18px; align-items: stretch; }
  .card { flex: 1; background: var(--paper); border-radius: 3px; padding: 20px 16px; border: 1px solid var(--line-light); display: flex; flex-direction: column; gap: 8px; }
  .name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
  .val  { font-size: 10px; color: var(--muted); line-height: 1.5; }
  .btn  { display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px; border-radius: 999px; background: var(--navy); color: var(--cream); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: none; }
</style>
</head>
<body>
<div class="card" style="box-shadow:var(--shadow-soft)">
  <div class="name">Ambient</div>
  <div class="val">0 24px 80px rgba(7,27,52,0.12)<br>Resting elevation for cards</div>
</div>
<div class="card" style="box-shadow:var(--shadow-card)">
  <div class="name">Card</div>
  <div class="val">0 18px 50px rgba(7,27,52,0.24)<br>Surfaces needing separation</div>
</div>
<div class="card" style="background:var(--cream);border:none;box-shadow:none;justify-content:center;align-items:center">
  <button class="btn" style="box-shadow:var(--shadow-button)">Primary CTA</button>
  <div class="val" style="text-align:center;margin-top:8px">0 14px 36px rgba(7,27,52,0.22)</div>
</div>
<div class="card" style="background:var(--navy);border-color:var(--line-dark)">
  <div class="name" style="color:var(--cream)">Sheen</div>
  <div class="val" style="color:#9fb3c8">inset 0 1px 0 rgba(255,255,255,0.72)<br>One-pixel top highlight on surfaces</div>
  <div style="flex:1;border-radius:3px;background:rgba(255,255,255,0.055);box-shadow:inset 0 1px 0 rgba(255,255,255,0.72);border:1px solid var(--line-dark);margin-top:4px"></div>
</div>
</body>
</html>
