<!-- @dsCard group="Colors" viewport="700x280" name="Primary & Signal" subtitle="Deep Navy dominates · Signal Teal for interactive · never restrained accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream); font-family: var(--font-mono); }
  .swatches { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 3px; overflow: hidden; }
  .swatch__color { height: 100px; }
  .swatch__info { padding: 10px 12px; background: var(--paper); border: 1px solid var(--line-light); border-top: none; }
  .swatch__name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
  .swatch__hex  { font-size: 11px; letter-spacing: 0.04em; color: var(--slate); margin-top: 3px; }
  .swatch__var  { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="swatch__color" style="background:#002D56"></div><div class="swatch__info"><div class="swatch__name">Deep Navy</div><div class="swatch__hex">#002D56</div><div class="swatch__var">--navy</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#001830"></div><div class="swatch__info"><div class="swatch__name">Navy Night</div><div class="swatch__hex">#001830</div><div class="swatch__var">--navy-2</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#0A1F3D"></div><div class="swatch__info"><div class="swatch__name">Ink</div><div class="swatch__hex">#0A1F3D</div><div class="swatch__var">--ink</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#0A6EA8"></div><div class="swatch__info"><div class="swatch__name">Signal Teal</div><div class="swatch__hex">#0A6EA8</div><div class="swatch__var">--teal</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#71C9F2"></div><div class="swatch__info"><div class="swatch__name">Bright Signal</div><div class="swatch__hex">#71C9F2</div><div class="swatch__var">--teal-2</div></div></div>
</div>
</body>
</html>
