<!-- @dsCard group="Colors" viewport="700x280" name="Neutrals" subtitle="Instrument Mist page bg · Paper cards · Slate secondary text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream); font-family: var(--font-mono); }
  .swatches { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 3px; overflow: hidden; }
  .swatch__color { height: 100px; border: 1px solid var(--line-light); border-bottom: none; border-radius: 3px 3px 0 0; }
  .swatch__info { padding: 10px 12px; background: var(--paper); border: 1px solid var(--line-light); border-top: none; }
  .swatch__name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
  .swatch__hex  { font-size: 11px; letter-spacing: 0.04em; color: var(--slate); margin-top: 3px; }
  .swatch__var  { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="swatch__color" style="background:#4D5D6E"></div><div class="swatch__info"><div class="swatch__name">Slate</div><div class="swatch__hex">#4D5D6E</div><div class="swatch__var">--slate</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#5B6B7D"></div><div class="swatch__info"><div class="swatch__name">Muted Steel</div><div class="swatch__hex">#5B6B7D</div><div class="swatch__var">--muted</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#D3DAE1"></div><div class="swatch__info"><div class="swatch__name">Tan</div><div class="swatch__hex">#D3DAE1</div><div class="swatch__var">--tan</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#E2E7EB"></div><div class="swatch__info"><div class="swatch__name">Mist Deep</div><div class="swatch__hex">#E2E7EB</div><div class="swatch__var">--cream-2</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#EEF1F4"></div><div class="swatch__info"><div class="swatch__name">Instrument Mist</div><div class="swatch__hex">#EEF1F4</div><div class="swatch__var">--cream</div></div></div>
  <div class="swatch"><div class="swatch__color" style="background:#FFFFFF"></div><div class="swatch__info"><div class="swatch__name">Paper</div><div class="swatch__hex">#FFFFFF</div><div class="swatch__var">--paper</div></div></div>
</div>
</body>
</html>
